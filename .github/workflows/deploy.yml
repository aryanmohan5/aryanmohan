name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` — that requires package-lock.json to exist in the repo.
          # Once you commit package-lock.json after your first local `npm install`,
          # you can add `cache: npm` back here for faster CI.

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js (static export)
        env:
          # Repo is github.com/aryanmohan5/aryanmohan → served at /aryanmohan/
          NEXT_PUBLIC_BASE_PATH: /aryanmohan
        run: npm run build

      - name: Disable Jekyll on the output
        run: touch ./out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
